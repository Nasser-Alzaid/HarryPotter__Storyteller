<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="src/934.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Storyteller</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "AmazonEmberDisplay_BdIt";
        src: url("fonts/AmazonEmberDisplay_BdIt.ttf") format("truetype");
        font-weight: bold;
        font-style: italic;
      }
      @font-face {
        font-family: "AmazonEmberDisplay_RdIt";
        src: url("fonts/AmazonEmberDisplay_RdIt.ttf") format("truetype");
        font-weight: normal;
        font-style: italic;
      }
      @font-face {
        font-family: "Harry P";
        src: url("fonts/HarryP.ttf") format("truetype");
        font-weight: normal;
        font-style: normal;
      }
      h1 {
        font-family: "Harry P", "Poppins", sans-serif;
      }
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: "Harry P", "Poppins", sans-serif;
      }

      .story-text {
        font-family: "Harry P", "Poppins", sans-serif;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Harry P", "Poppins", sans-serif;
      }
      body {
        font-family: "Harry P", "Poppins", sans-serif;
        background: url("src/hogwarts.png") center center no-repeat;
        background-size: cover;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
        position: relative;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #34180146; /* optional overlay 741dd846 */
        z-index: 0;
        pointer-events: none;
      }
      .container {
        position: relative;
        z-index: 1;
        max-width: 800px;
        width: 100%;
        background-image: url("src/oldLetter.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        padding: 2rem;
        margin-top: 2rem;
      }
      h1 {
        color: #1a1a1a;
        text-align: center;
        margin-bottom: 2rem;
        font-size: 6rem;
      }
      .input-section {
        margin-bottom: 3rem;
      }
      .controls-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      textarea {
        width: 100%;
        padding: 1rem;
        border: 2px solid #e1e1e1;
        border-radius: 8px;
        resize: vertical;
        min-height: 100px;
        font-size: 1.3rem;
        margin-bottom: 1rem;
      }
      .voice-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-left: auto;
        width: 200px;
      }
      .voice-label {
        color: #3b2200;
        font-size: 1.45rem;
        min-width: 64px;
        font-family: "Harry P", "Poppins", sans-serif;
      }
      .voice-select {
        width: 220px;
        border: 1px solid #9b7340;
        border-radius: 8px;
        background: #f7e8c2;
        color: #3a2108;
        padding: 0.55rem 0.75rem;
        font-size: 1.5rem;
        font-family: "Harry P", "Poppins", sans-serif;
      }
      .voice-select:focus-visible {
        outline: 3px solid rgba(201, 163, 84, 0.45);
        outline-offset: 2px;
      }
      button {
        background: #3b2200dd;
        color: white;
        border: none;
        padding: 0.8rem 1.5rem;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1.4rem;
        font-weight: 500;
        transition: background 0.3s ease;
      }
      button:hover {
        background: #3b220076;
      }
      .generate-btn {
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(
            circle at 16% 18%,
            rgba(255, 236, 185, 0.28) 0%,
            rgba(255, 236, 185, 0) 40%
          ),
          linear-gradient(145deg, #6b1f24 0%, #451217 100%);
        color: #f4dfad;
        border: 1px solid #c9a354;
        border-radius: 999px;
        padding: 0.9rem 2rem;
        font-family: "Harry P", "Poppins", sans-serif;
        font-size: 1.75rem;
        letter-spacing: 0.03em;
        text-transform: none;
        text-shadow: 0 1px 0 rgba(0, 0, 0, 0.45);
        box-shadow:
          0 10px 20px rgba(0, 0, 0, 0.28),
          inset 0 1px 0 rgba(255, 233, 183, 0.28);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          filter 0.2s ease;
      }
      .generate-btn::after {
        content: "";
        position: absolute;
        top: 0;
        left: -140%;
        width: 55%;
        height: 100%;
        transform: skewX(-20deg);
        background: linear-gradient(
          110deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.42) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        transition: left 0.5s ease;
        pointer-events: none;
      }
      .generate-btn:hover {
        transform: translateY(-2px);
        filter: brightness(1.04);
        box-shadow:
          0 14px 26px rgba(0, 0, 0, 0.34),
          0 0 12px rgba(224, 177, 86, 0.2),
          inset 0 1px 0 rgba(255, 233, 183, 0.35);
      }
      .generate-btn:hover::after {
        left: 160%;
      }
      .generate-btn:active {
        transform: translateY(1px);
        filter: brightness(0.98);
        box-shadow:
          0 6px 12px rgba(0, 0, 0, 0.28),
          inset 0 2px 6px rgba(0, 0, 0, 0.28);
      }
      .generate-btn:focus-visible {
        outline: 3px solid rgba(201, 163, 84, 0.58);
        outline-offset: 3px;
      }
      .story-section {
        background-image: url("src/oldLetter.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        padding: 1.5rem;
        border-radius: 8px;
        margin-top: 2rem;
      }

      .story-text {
        line-height: 1.6;
        color: #1a1a1a;
        white-space: pre-wrap;
        font-size: 1.9rem;
      }
      .word {
        display: inline-block;
        opacity: 0;
        transform: translateY(30px);
        transition:
          opacity 0.8s ease,
          transform 0.8s ease;
      }
      .word.visible {
        opacity: 1;
        transform: translateY(0);
      }
      .loading {
        display: none;
        text-align: center;
        margin: 3rem 0;
        font-size: 1.8rem;
      }
      .loading::after {
        content: "...";
        animation: dots 1.5s steps(5, end) infinite;
      }

      .audio-player-wrap {
        display: none;
        margin-top: 1.2rem;
        padding: 0.8rem;
        border-radius: 12px;
        background:
          radial-gradient(
            circle at 20% 18%,
            rgba(255, 235, 189, 0.4) 0%,
            rgba(255, 235, 189, 0) 40%
          ),
          linear-gradient(145deg, #5a1e22 0%, #3a1115 100%);
        border: 1px solid #c9a354;
        box-shadow:
          0 12px 24px rgba(0, 0, 0, 0.25),
          inset 0 1px 0 rgba(255, 233, 183, 0.3);
      }
      .audio-player-wrap::before {
        content: "";
        display: block;
        width: 100%;
        height: 1px;
        background: linear-gradient(
          90deg,
          rgba(255, 220, 145, 0) 0%,
          rgba(255, 220, 145, 0.8) 50%,
          rgba(255, 220, 145, 0) 100%
        );
        margin-bottom: 0.55rem;
      }
      .audio-label {
        color: #f4dfad;
        font-family: "Harry P", "Poppins", sans-serif;
        font-size: 1.5rem;
        letter-spacing: 0.03em;
        text-transform: none;
        margin-bottom: 0.5rem;
        text-shadow: 0 1px 0 rgba(0, 0, 0, 0.45);
      }
      #audioPlayer {
        width: 100%;
        border-radius: 10px;
        background: #efe1bc;
        padding: 0.22rem;
      }
      #audioPlayer::-webkit-media-controls-panel {
        background: linear-gradient(180deg, #f0e0b4 0%, #dcc58f 100%);
      }
      #audioPlayer::-webkit-media-controls-play-button,
      #audioPlayer::-webkit-media-controls-mute-button {
        filter: sepia(0.35) saturate(1.1);
      }
      #audioPlayer::-webkit-media-controls-current-time-display,
      #audioPlayer::-webkit-media-controls-time-remaining-display {
        color: #3d250b;
        text-shadow: none;
      }
      @media (max-width: 600px) {
        .controls-row {
          flex-direction: column;
          align-items: stretch;
        }
        .voice-row {
          margin-left: 0;
          justify-content: space-between;
          align-items: center;
          gap: 0.4rem;
        }
        .voice-label {
          font-size: 1.2rem;
        }
        .voice-select {
          width: 65%;
          font-size: 1.05rem;
        }
        .generate-btn {
          width: 100%;
          font-size: 1.45rem;
          padding: 0.95rem 1.2rem;
          letter-spacing: 0.02em;
        }
        .audio-player-wrap {
          padding: 0.7rem;
        }
        .audio-label {
          font-size: 1.15rem;
          letter-spacing: 0.02em;
        }
      }
      @keyframes dots {
        0%,
        20% {
          content: "✨";
        }
        40% {
          content: "✨✨";
        }
        60% {
          content: "✨✨✨";
        }
        80%,
        100% {
          content: "";
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>✨ Harry Potter ✨</h1>

      <div class="input-section">
        <textarea
          id="promptInput"
          placeholder="Enter your prompt for a Harry Potter story...✨"
        ></textarea>
        <div class="controls-row">
          <button class="generate-btn" onclick="generateStory()">
            Generate Story
          </button>
          <div class="voice-row">
            <label class="voice-label" for="voiceSelect">Narrator</label>
            <select id="voiceSelect" class="voice-select">
              <option value="Amy">Amy</option>
              <option value="Kevin">Kevin</option>
              <option value="Joanna">Joanna</option>
              <option value="Matthew">Matthew</option>
              <option value="Salli">Salli</option>
              <option value="Brian">Brian</option>
              <option value="Ivy">Ivy</option>
              <option value="Kendra">Kendra</option>
            </select>
          </div>
        </div>
      </div>

      <div class="loading" id="loading">Generating your story 🪄</div>

      <div class="story-section">
        <div class="audio-player-wrap" id="audioPlayerWrap">
          <div class="audio-label" id="audioLabel">Hogwarts Narration</div>
          <audio id="audioPlayer" controls></audio>
        </div>
        <div class="story-text" id="storyOutput"></div>
      </div>
    </div>

    <audio id="background-audio" loop style="display: none">
      <source src="sounds/harry_potter_st.mp3" type="audio/mpeg" />
    </audio>

    <script>
      function clearNarrationSync(audioPlayer) {
        audioPlayer.onloadedmetadata = null;
        audioPlayer.ontimeupdate = null;
        audioPlayer.onseeked = null;
        audioPlayer.onpause = null;
        audioPlayer.onended = null;
      }

      function renderStoryWithNarration(audioPlayer, storyOutput, fullStory) {
        if (!fullStory) {
          storyOutput.textContent = "";
          return;
        }

        const duration = audioPlayer.duration;
        let visibleChars = 0;

        if (Number.isFinite(duration) && duration > 0) {
          const textSpeedMultiplier = 1; // increase to show text faster
          const progress = Math.min(
            1,
            Math.max(0, audioPlayer.currentTime / duration),
          );
          visibleChars = Math.floor(
            fullStory.length * progress * textSpeedMultiplier,
          );
        } else {
          // Fallback for browsers that do not report a finite duration.
          visibleChars = Math.floor(audioPlayer.currentTime * 28);
        }

        visibleChars = Math.min(fullStory.length, Math.max(1, visibleChars));
        storyOutput.textContent = fullStory.slice(0, visibleChars);
      }

      // On page load, display last story if available
      window.onload = function () {
        // Clear the story and audio on page load
        const audioPlayer = document.getElementById("audioPlayer");
        document.getElementById("storyOutput").textContent = "";
        document.getElementById("audioPlayerWrap").style.display = "none";
        clearNarrationSync(audioPlayer);
        audioPlayer.pause();
        audioPlayer.removeAttribute("src");
        audioPlayer.load();
        localStorage.removeItem("lastStory");
        localStorage.removeItem("lastMp3");
      };
      async function generateStory() {
        const promptInput = document.getElementById("promptInput");
        const voiceSelect = document.getElementById("voiceSelect");
        const storyOutput = document.getElementById("storyOutput");
        const loading = document.getElementById("loading");
        const audioPlayer = document.getElementById("audioPlayer");
        const audioPlayerWrap = document.getElementById("audioPlayerWrap");
        const audioLabel = document.getElementById("audioLabel");
        const backgroundAudio = document.getElementById("background-audio");
        const selectedVoice = voiceSelect.value || "Amy";
        if (!promptInput.value.trim()) {
          alert("Please enter a prompt first!");
          return;
        }
        loading.style.display = "block";
        storyOutput.textContent = "";
        audioLabel.textContent = "Hogwarts Narration";
        audioPlayerWrap.style.display = "none";
        clearNarrationSync(audioPlayer);
        audioPlayer.pause();
        audioPlayer.removeAttribute("src");
        audioPlayer.load();
        // Play background audio only when Generate Story is clicked
        backgroundAudio.volume = 0.3; // Set volume to 30%
        backgroundAudio
          .play()
          .catch((error) =>
            console.error("Background audio failed to play:", error),
          );
        try {
          const response = await fetch("/generate-story", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              prompt: promptInput.value,
              voiceId: selectedVoice,
            }),
          });
          const data = await response.json();
          const fullStory = data.story || "";
          localStorage.setItem("lastStory", fullStory);
          if (data.mp3) {
            audioPlayer.src = data.mp3;
            audioLabel.textContent = `Hogwarts Narration - ${selectedVoice}`;
            audioPlayerWrap.style.display = "block";
            storyOutput.textContent = "";

            const syncTextToAudio = () =>
              renderStoryWithNarration(audioPlayer, storyOutput, fullStory);

            audioPlayer.onloadedmetadata = syncTextToAudio;
            audioPlayer.ontimeupdate = syncTextToAudio;
            audioPlayer.onseeked = syncTextToAudio;
            audioPlayer.onpause = syncTextToAudio;
            audioPlayer.onended = () => {
              storyOutput.textContent = fullStory;
            };

            localStorage.setItem("lastMp3", data.mp3);
          } else {
            storyOutput.textContent = fullStory;
            audioPlayerWrap.style.display = "none";
            localStorage.removeItem("lastMp3");
          }
        } catch (error) {
          storyOutput.textContent = "Error generating story. Please try again.";
          audioPlayerWrap.style.display = "none";
          localStorage.removeItem("lastMp3");
          console.error("Error:", error);
        } finally {
          loading.style.display = "none";
        }
      }
    </script>
    <script>
      // Get the audio element
      const audioElement = document.getElementById("background-audio");

      // Function to start the game and audio
      function startGame() {
        console.log("Starting game...");

        // Play the background audio
        audioElement
          .play()
          .then(() => {
            console.log("Audio playback started.");
          })
          .catch((error) => {
            console.error("Audio playback failed:", error);
          });

        // Hide the start button (if it exists)
        const startButton = document.getElementById("start-button");
        if (startButton) {
          startButton.style.display = "none";
        }

        // Your existing game start logic...
      }

      // Example function to stop the game and audio (if needed)

      // Your existing game stop logic...

      // Add event listener to the start button (or any user interaction element)
      document
        .getElementById("start-button")
        .addEventListener("click", startGame);

      // Additional event listener to start the audio on any click (optional)
      document.addEventListener("click", () => {
        if (audioElement.paused) {
          audioElement
            .play()
            .then(() => {
              console.log("Audio playback started on document click.");
            })
            .catch((error) => {
              console.error("Audio playback failed on document click:", error);
            });
        }
      });
    </script>
  </body>
</html>
